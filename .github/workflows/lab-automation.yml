name: Lab Automation

on:
  push:
    paths:
      - 'labs/**'

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Auto create meta.yml for new labs
        run: python .github/scripts/create_meta.py

      - name: Update labs index
        run: python .github/scripts/update_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add labs/
          git diff --cached --quiet || git commit -m "auto: update labs"
          git push
